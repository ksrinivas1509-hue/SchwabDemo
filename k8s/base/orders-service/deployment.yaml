apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-service
  namespace: apps
  labels:
    app: orders-service
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      serviceAccountName: orders-service-sa
      containers:
        - name: orders-service
          image: orders-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: orders-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: orders-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orders-db-credentials
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Same slow-cold-start issue as catalog-service, compounded by waiting on the
          # cloud-sql-proxy sidecar — startupProbe suppresses liveness/readiness until
          # the app answers once (up to 150s here) instead of getting killed mid-boot.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 15
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.0
          env:
            - name: INSTANCE_CONNECTION_NAME
              valueFrom:
                configMapKeyRef:
                  name: orders-service-config
                  key: INSTANCE_CONNECTION_NAME
          args:
            - "--port=5432"
            - "--structured-logs"
            # orders-db is private-IP-only (ipv4_enabled = false in
            # modules/observability) — without this flag the proxy defaults to
            # looking up a public IP and fails with "instance does not have IP of
            # type PUBLIC".
            - "--private-ip"
            - "$(INSTANCE_CONNECTION_NAME)"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
