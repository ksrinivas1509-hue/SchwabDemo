apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: apps
  labels:
    app: catalog-service
  annotations:
    cloud.google.com/backend-config: '{"default": "catalog-service-backendconfig"}'
spec:
  type: ClusterIP
  selector:
    app: catalog-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
