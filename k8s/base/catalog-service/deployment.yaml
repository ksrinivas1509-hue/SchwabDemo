apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: apps
  labels:
    app: catalog-service
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      serviceAccountName: catalog-service-sa
      containers:
        - name: catalog-service
          image: catalog-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: catalog-service-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Spring Boot cold start here took 36s+ under the default 100m CPU request
          # (JIT warmup under throttling), well past the old liveness probe's 20s+3x15s
          # = 65s worst-case kill window — kubelet was killing the app mid-startup in a
          # crash loop. startupProbe suppresses liveness/readiness until the app
          # answers once (up to 150s here), then hands off to the normal tighter probes.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
